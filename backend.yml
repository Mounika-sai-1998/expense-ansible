- name: configure backend
  hosts: backend
  become: yes
  tasks:
  - name: disabiling default nodejs
    ansible.builtin.command: dnf module disable nodejs -y

  - name: enabliling nodejs:20
    ansible.builtin.command: dnf module enable nodejs:20 -y

  - name: install nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: latest

  - name: create the expense user
    ansible.builtin.user:
      name: expense

  - name: create app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: download the application code
    ansible.builtin.get_url:
      url: https://expense-builds.s3.us-east-1.amazonaws.com/expense-backend-v2.zip
      dest: /tmp/backend.zip   

  - name: unzip the backend code
    ansible.builtin.unarchive:
      src: /tmp/backend.zip   # by default it checks in ansible server
      dest: /app
      remote_src: yes

  - name: install npm packages
    ansible.builtin.command: npm install
    args:
      chdir: /app    # to change directory to app