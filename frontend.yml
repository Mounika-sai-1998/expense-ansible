- name: configure frontend
  hosts: frontend
  become: yes
  tasks:
  - name: install nginx 
    ansible.builtin.dnf:
      name: nginx
      state: latest

  - name: start and enable nginx
    ansible.builtin.service:
      name: nginx
      state: started
      enabled: yes

  - name: removing the webiste
    ansible.builtin.file:
      path: /usr/share/nginx/html/
      state: absent

  - name: createc a empty directory
    ansible:builtin.file:
      path: /usr/share/nginx/
      state: directory